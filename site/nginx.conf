server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Базовая безопасность
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # Кэш для статики (CSS/JS), HTML — без кэша чтобы новые версии быстро доходили
    location ~* \.(css|js|svg|png|jpg|webp|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Релизные файлы приложения (APK / Windows ZIP).
    # Монтируются как volume в /usr/share/nginx/html/downloads.
    location /downloads/ {
        alias /usr/share/nginx/html/downloads/;
        autoindex off;
        # Заставляем браузер скачивать, а не открывать.
        add_header Content-Disposition "attachment";
        # Кэш на сутки — обновится после релиза следующей версии.
        expires 1d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
