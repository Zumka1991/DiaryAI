name: diaryai
description: "Encrypted diary with AI analysis"
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Crypto: Argon2id (KDF), XChaCha20-Poly1305 (шифрование записей)
  cryptography_plus: ^3.0.0

  # Хранение мастер-ключа и JWT в Keychain / Android Keystore
  flutter_secure_storage: ^9.2.2

  # HTTP клиент к нашему серверу
  dio: ^5.7.0

  # Локальная БД
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4       # desktop (Windows/Linux/macOS)
  sqflite_common_ffi_web: ^0.4.5   # web (sqlite3.wasm + worker)
  path_provider: ^2.1.5
  path: ^1.9.0

  # Утилиты
  uuid: ^4.5.1
  intl: ^0.20.0
  collection: ^1.18.0

  # Дизайн
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
